<h2>BMW Booking Form</h2>

<form id="bookingForm">
    <input type="text" id="name" placeholder="Your Name" required><br><br>

    <input type="email" id="email" placeholder="Your Email" required><br><br>

    <input type="text" id="phone" placeholder="Phone Number" required><br><br>

    <input type="text" id="car_model" placeholder="BMW Model" required><br><br>

    <input type="text" id="city" placeholder="City" required><br><br>

    <button type="submit">Book Now</button>
</form>

<p id="result"></p>

<!-- Success Message -->
<div id="successMessage" style="display:none; text-align:center; margin-top:20px;">
    <h2 style="color:green;">🎉 Congratulations!</h2>
    <p>Your BMW booking was successful.</p>

    <button onclick="window.location.href='index.html'">
        Go Back Home
    </button>
</div>

<script>
document.getElementById("bookingForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    try {
        const response = await fetch("http://127.0.0.1:5000/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                car_model: document.getElementById("car_model").value,
                city: document.getElementById("city").value
            })
        });

        const data = await response.json();

        document.getElementById("result").innerHTML =
            "✅ Booking Successful!<br>Booking ID: " + data.booking.booking_id;

        // Hide the form
        document.getElementById("bookingForm").style.display = "none";

        // Show success message
        document.getElementById("successMessage").style.display = "block";

    } catch (error) {
        document.getElementById("result").innerHTML =
            "❌ Error: Could not connect to the server.";
    }
});
</script>
